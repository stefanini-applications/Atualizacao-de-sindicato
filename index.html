<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parâmetros Sindicais</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Unavailable state -->
  <div id="state-unavailable" class="state-screen d-none">
    <div class="alert alert-danger text-center" role="alert">
      <span class="fs-5">A base de parâmetros sindicais está indisponível</span>
    </div>
  </div>

  <!-- Loading state -->
  <div id="state-loading" class="state-screen">
    <div class="d-flex align-items-center gap-2 text-secondary">
      <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
      <span>Carregando base de parâmetros sindicais…</span>
    </div>
  </div>

  <!-- Main application -->
  <div id="app" class="d-none">
    <header class="app-header">
      <div class="container-fluid">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <h1 class="app-title mb-0">Parâmetros Sindicais</h1>
          <span id="data-geracao-badge" class="badge text-bg-secondary d-none"></span>
        </div>
      </div>
    </header>

    <main class="container-fluid py-3">
      <!-- Filters -->
      <section class="card mb-3" aria-label="Filtros">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-6 col-md-2">
              <label for="filter-uf" class="form-label mb-1">UF</label>
              <select id="filter-uf" class="form-select form-select-sm">
                <option value="">Todas</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label for="filter-sindicato" class="form-label mb-1">Sindicato</label>
              <input
                id="filter-sindicato"
                type="text"
                class="form-control form-control-sm"
                placeholder="Busca parcial…"
                autocomplete="off"
              />
            </div>
            <div class="col-6 col-md-2">
              <label for="filter-ano" class="form-label mb-1">Ano de referência</label>
              <select id="filter-ano" class="form-select form-select-sm">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label for="filter-status" class="form-label mb-1">Status</label>
              <select id="filter-status" class="form-select form-select-sm">
                <option value="">Todos</option>
                <option value="valido">Válido</option>
                <option value="pendente_revisao">Pendente de revisão</option>
                <option value="conflito">Conflito</option>
              </select>
            </div>
            <div class="col-6 col-md-2 d-flex align-items-end">
              <button id="btn-clear-filters" class="btn btn-outline-secondary btn-sm w-100">
                Limpar filtros
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- Result count -->
      <div class="d-flex align-items-center justify-content-between mb-2 px-1">
        <span id="result-count" class="text-secondary small"></span>
      </div>

      <!-- Table -->
      <div class="table-responsive">
        <table class="table table-hover table-sm align-middle" id="params-table">
          <thead class="table-light">
            <tr>
              <th scope="col">UF</th>
              <th scope="col">Sindicato</th>
              <th scope="col">Ano</th>
              <th scope="col">Reajuste (%)</th>
              <th scope="col">Data-base</th>
              <th scope="col">Vigência início</th>
              <th scope="col">Vigência fim</th>
              <th scope="col">Status</th>
              <th scope="col">Fonte</th>
            </tr>
          </thead>
          <tbody id="params-tbody"></tbody>
        </table>
      </div>

      <!-- No results -->
      <div id="no-results" class="text-center text-secondary py-4 d-none">
        Nenhum parâmetro sindical encontrado para os filtros selecionados
      </div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div
    class="modal fade"
    id="detail-modal"
    tabindex="-1"
    aria-labelledby="detail-modal-label"
    aria-modal="true"
    role="dialog"
  >
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="detail-modal-label">Detalhe do parâmetro</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body" id="detail-modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFRXiKdVsAo8o8bAIFaQKDBJQoQ"
    crossorigin="anonymous"
  ></script>
  <script src="app.js"></script>
</body>
</html>
